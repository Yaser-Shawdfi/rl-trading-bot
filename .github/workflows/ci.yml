# RL Trader — CI/CD Pipeline
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check rl_trader/
          ruff format --check rl_trader/

      - name: Download test data
        run: python -c "import yfinance as yf; df = yf.download('AAPL', start='2023-01-01', end='2024-12-31', auto_adjust=True); df.to_csv('data/AAPL_daily.csv')"
        continue-on-error: true

      - name: Create fallback data if needed
        run: python scripts/create_test_data.py

      - name: Run core tests
        run: pytest rl_trader/tests/test_data.py rl_trader/tests/test_env.py -v --tb=short

      - name: Run API tests
        run: pytest rl_trader/tests/test_api.py -v --tb=short
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rl-trader:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm -d -p 8000:8000 --name rl-trader-test rl-trader:latest
          sleep 5
          curl -f http://localhost:8000/api/v1/health
          docker stop rl-trader-test