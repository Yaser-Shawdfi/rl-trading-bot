# RL Trader — Enterprise Configuration
# All runtime configuration lives here. Environment variables override these.

# ─── Trading ──────────────────────────────────────────────────────────────────
trading:
  symbol: AAPL
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  initial_balance: 10000
  window_size: 10
  fee: 0.001              # 0.1% per trade
  max_position: 1.0       # Max 100% invested

# ─── RL Agent ────────────────────────────────────────────────────────────────
agent:
  algorithm: PPO
  total_timesteps: 200000
  learning_rate: 0.0003
  batch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  n_steps: 2048
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  network_arch:
    pi: [128, 64]
    vf: [128, 64]
  ensemble_seeds: [42, 123, 777]

# ─── Reward ──────────────────────────────────────────────────────────────────
reward:
  type: risk_adjusted      # "simple" or "risk_adjusted"
  drawdown_penalty: 0.5
  sharpe_window: 20
  volatility_penalty: 0.1

# ─── Data ────────────────────────────────────────────────────────────────────
data:
  source: yfinance
  cache_dir: data
  train_ratio: 0.7
  indicators:
    - returns
    - log_returns
    - sma
    - ema
    - macd
    - rsi
    - bollinger
    - atr
    - stochastic
    - williams_r
    - obv
    - vwap
    - volatility
    - volume
    - momentum
    - lag_features
    - distance

# ─── API ─────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level: INFO
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  file: logs/rl_trader.log